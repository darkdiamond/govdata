# Cloud Build pipeline — regenerate manifest, build Nuxt site, deploy to
# Firebase Hosting. Triggered by govdata-builder after a successful agent
# run (see services/page_builder/pipeline.py::_trigger_publish).
#
# Uses a pre-baked image built by cloudbuild-publisher-image.yaml — it
# carries node 22, firebase-tools, gsutil, page_builder Python deps, and
# frontend/node_modules. That lets every step run on the same image
# (single pull) and skips `npm ci` + firebase-tools install on every
# publish.
#
# Substitutions:
#   _STAGING_BUCKET    GCS bucket the builder stages agent outputs to
#   _FIREBASE_PROJECT  Firebase / GCP project that owns Hosting + Firestore
#   _PUBLISHER_IMAGE   Pre-baked image (see cloudbuild-publisher-image.yaml)

steps:
  # [1] Pull only the agent's content.html (and any extras) from staging.
  #     The structured JSON files (data.json, agent_data.json) are written
  #     in step [2] from Firestore — never synced from GCS — so the two
  #     artifact paths can't drift.
  - id: 'fetch-pages'
    name: '${_PUBLISHER_IMAGE}'
    entrypoint: 'bash'
    waitFor: ['-']
    args:
      - '-c'
      - |
        set -euo pipefail
        mkdir -p frontend/public/datasets
        gsutil -m rsync -r "gs://${_STAGING_BUCKET}/datasets/" frontend/public/datasets/
        # No defensive delete of data.json/agent_data.json here — that
        # would race step [2] under waitFor:['-']. Step [2]'s publish.py
        # is the canonical writer and overwrites those files from
        # Firestore, so any stray copy is replaced for active sources.

  # [2] Emit per-dataset data.json + agent_data.json + aggregated manifest.json
  #     from Firestore — single source of truth.
  #     Runs concurrently with [1] (waitFor: ['-']): they write to disjoint
  #     paths under frontend/public/, and step [3] depends on both via
  #     default ("wait for all prior") sequencing.
  #     VOYAGE_API_KEY is mounted via availableSecrets so the publisher can
  #     compute + cache embeddings on sources that don't have one yet
  #     (services/page_builder/publish.py → embed()). Without it, related.py
  #     falls back to ministry + shared-tag scoring only.
  - id: 'publish-artifacts'
    name: '${_PUBLISHER_IMAGE}'
    entrypoint: 'bash'
    waitFor: ['-']
    env:
      - 'FIRESTORE_PROJECT_ID=${_FIREBASE_PROJECT}'
      - 'GOOGLE_CLOUD_PROJECT=${_FIREBASE_PROJECT}'
    secretEnv: ['VOYAGE_API_KEY']
    args:
      - '-c'
      - |
        set -euo pipefail
        mkdir -p frontend/public/data frontend/public/datasets
        python3 -m services.page_builder.publish \
          --from-firestore \
          --out frontend/public/

  # [3] nuxt generate + firebase deploy, in one step on the pre-baked image.
  #     Reuses /opt/frontend-deps/node_modules when package-lock matches the
  #     image; falls back to `npm ci` if the lock has drifted (rebuild the
  #     image via cloudbuild-publisher-image.yaml to restore the fast path).
  #     Restores frontend/node_modules/.cache from GCS keyed by
  #     md5(package-lock.json) to warm Vite/Nitro between builds; cache is
  #     best-effort so a miss or transient GCS error never breaks deploy.
  - id: 'generate-and-deploy'
    name: '${_PUBLISHER_IMAGE}'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        cd frontend
        # NB: bash ALL_CAPS dollar-references get parsed as Cloud Build
        # substitutions (and rejected) — use lowercase locals.
        if [ -f /opt/frontend-deps/package-lock.json ] \
           && [ "$(md5sum < /opt/frontend-deps/package-lock.json | cut -d' ' -f1)" \
              = "$(md5sum < package-lock.json | cut -d' ' -f1)" ]; then
          echo "package-lock.json matches image; reusing pre-baked node_modules"
          cp -a /opt/frontend-deps/node_modules node_modules
        else
          echo "package-lock.json differs from image; running npm ci (rebuild publisher image to restore fast path)"
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 10000
          for i in 1 2 3; do
            npm ci --prefer-offline --no-audit && break
            echo "npm ci retry $i/3"
            sleep 10
          done
        fi

        # Build cache: keyed by md5(package-lock.json) so dependency drift
        # busts the cache automatically. Restore is best-effort — a miss or
        # error never blocks the deploy.
        # We cache .nuxt (prepare/build artifacts) + node_modules/.cache
        # (Vite prebundle), but NEVER .output: that's the deployable, and a
        # stale restore would publish old pages.
        lock_hash=$(md5sum < package-lock.json | cut -d' ' -f1)
        cache_uri="gs://${_STAGING_BUCKET}/build-cache/$lock_hash/nuxt-cache.tar.zst"
        if gsutil -q stat "$cache_uri" 2>/dev/null; then
          echo "restoring nuxt build cache from $cache_uri"
          if gsutil cat "$cache_uri" | tar -I zstd -xf -; then
            echo "cache restored"
          else
            echo "cache restore failed, continuing cold"
            rm -rf node_modules/.cache .nuxt
          fi
        else
          echo "no nuxt build cache at $cache_uri (cold start)"
        fi

        npm run generate

        # Save cache after a successful generate; non-fatal on error.
        cache_paths=""
        [ -d node_modules/.cache ] && cache_paths="$cache_paths node_modules/.cache"
        [ -d .nuxt ] && cache_paths="$cache_paths .nuxt"
        if [ -n "$cache_paths" ]; then
          echo "saving nuxt build cache to $cache_uri"
          if tar -I 'zstd -T0 -3' -cf - $cache_paths | gsutil -q cp - "$cache_uri"; then
            echo "cache saved"
          else
            echo "cache save failed (non-fatal)"
          fi
        fi

        cd ..
        firebase deploy \
          --only hosting \
          --project "${_FIREBASE_PROJECT}" \
          --non-interactive

substitutions:
  _STAGING_BUCKET: 'govdata-il-staging'
  _FIREBASE_PROJECT: 'govdata-il'
  _PUBLISHER_IMAGE: 'me-west1-docker.pkg.dev/govdata-il/publisher/publisher:latest'

availableSecrets:
  secretManager:
    - versionName: 'projects/${_FIREBASE_PROJECT}/secrets/voyage-api-key/versions/latest'
      env: 'VOYAGE_API_KEY'

options:
  logging: CLOUD_LOGGING_ONLY
  # Default machineType (e2-standard-2). Nuxt generate is single-thread
  # bound; the prior E2_HIGHCPU_8 was wasted CPU and 5x billing.

timeout: '1800s'
