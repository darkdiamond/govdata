# Publish govil.ai: GCS pages + Firestore artifacts → nuxt generate → Firebase.
#
# Two triggers:
#   - push to main touching the frontend/publisher → push-to-deploy
#   - workflow_dispatch → fired by the govdata-builder after agent runs
#     (services/page_builder/pipeline.py::_trigger_publish, PUBLISH_VIA=github)
#     and available for manual runs from the Actions tab.
#
# Bursts collapse: the `publish` concurrency group cancels the in-flight
# run when a newer one starts, so N rapid site updates cost one deploy.
#
# Auth is keyless via Workload Identity Federation (infra/github-ci.setup.sh):
# the govdata-ci service account can read Firestore + the staging bucket and
# deploy Firebase Hosting — nothing else.
name: publish

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'services/page_builder/publish.py'
      - 'services/page_builder/manifest.py'
      - 'services/page_builder/related.py'
      - 'services/page_builder/schema.py'
      - 'services/shared/**'
      - 'firebase.json'
      - '.github/workflows/publish.yml'
  workflow_dispatch: {}

concurrency:
  group: publish
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write   # WIF OIDC

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PROJECT: ${{ vars.FIREBASE_PROJECT }}
      STAGING_BUCKET: ${{ vars.GCS_STAGING_BUCKET }}
    steps:
      - uses: actions/checkout@v7

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_CI_SA }}

      - uses: google-github-actions/setup-gcloud@v3

      # Delta fetch: the cache carries the previous run's pages, so rsync
      # only moves new/changed objects. Cache key always misses (run id) —
      # restore-keys pulls the most recent snapshot, then we save ours.
      - uses: actions/cache@v5
        with:
          path: frontend/public/datasets
          key: datasets-${{ github.run_id }}
          restore-keys: |
            datasets-

      - name: Fetch agent pages from staging
        run: |
          mkdir -p frontend/public/datasets
          gsutil -m rsync -r -d \
            -x '.*/(data|agent_data)\.json$|.*/index\.html$' \
            "gs://${STAGING_BUCKET}/datasets/" frontend/public/datasets/

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: services/page_builder/requirements.txt

      - name: Publish artifacts from Firestore
        run: |
          pip install -q -r services/page_builder/requirements.txt
          python -m services.page_builder.publish --from-firestore \
            --out frontend/public/
        env:
          PYTHONPATH: ${{ github.workspace }}
          FIRESTORE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT }}
          GOOGLE_CLOUD_PROJECT: ${{ vars.FIREBASE_PROJECT }}

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Generate site
        working-directory: frontend
        run: |
          npm ci --prefer-offline --no-audit --no-fund
          npm run generate

      - name: Deploy to Firebase Hosting
        run: |
          npx --yes firebase-tools@14.x.x deploy --only hosting \
            --project "${PROJECT}" --non-interactive

      # Tell Bing/Yandex/etc. about every URL right after deploy (IndexNow).
      # Key file ships in frontend/public/; failures never block the deploy.
      - name: Ping IndexNow
        continue-on-error: true
        run: node frontend/scripts/indexnow-ping.mjs
